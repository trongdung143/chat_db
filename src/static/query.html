<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Stream</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5em;
            font-weight: 600;
        }

        .header-close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s ease;
        }

        .header-close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        #chat-box::-webkit-scrollbar {
            width: 8px;
        }

        #chat-box::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        #chat-box::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .message {
            margin: 10px 0;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            max-width: 95%;
        }

        .message.bot.streaming::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-left: 6px;
            border: 2px solid #00bcd4;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .markdown-content {
            line-height: 1.6;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin: 16px 0 8px 0;
            font-weight: 600;
        }

        .markdown-content h1 {
            font-size: 1.8em;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 8px;
        }

        .markdown-content h2 {
            font-size: 1.5em;
        }

        .markdown-content h3 {
            font-size: 1.2em;
        }

        .markdown-content p {
            margin: 8px 0;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .markdown-content li {
            margin: 4px 0;
        }

        .markdown-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #e83e8c;
        }

        .markdown-content pre {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            color: #a9dc76;
            font-size: 0.9em;
        }

        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }

        .markdown-content table th,
        .markdown-content table td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        .markdown-content table th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        #message-input:focus {
            border-color: #00bcd4;
        }

        #send-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 188, 212, 0.4);
        }

        #send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .timestamp {
            font-size: 0.75em;
            opacity: 0.6;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-btn-primary {
            width: 100%;
            padding: 12px 25px;
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 188, 212, 0.4);
        }

        .modal-btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-text {
            color: #c62828;
            font-size: 0.9em;
            margin-bottom: 15px;
            text-align: center;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .status-line {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #e3f2fd;
            border-left: 3px solid #2196F3;
            border-radius: 4px;
            font-size: 0.9em;
            color: #1976D2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 24px;
        }

        .status-line.done {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
        }

        .done-summary {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
            border-radius: 4px;
            font-size: 0.9em;
            color: #2e7d32;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 24px;
        }

        .done-text {
            flex: 1;
        }

        .status-line.error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }

        .status-line.warning {
            background: #fff3e0;
            border-left-color: #ff9800;
            color: #e65100;
        }

        .status-line.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
        }

        .status-text {
            flex: 1;
        }

        .toggle-steps-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85em;
            padding: 2px 6px;
            margin-left: 8px;
            color: inherit;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .toggle-steps-btn:hover {
            opacity: 1;
        }

        .steps-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, margin-bottom 0.3s ease;
        }

        .steps-container.expanded {
            max-height: 500px;
            margin-bottom: 8px;
        }

        .step-item {
            margin-bottom: 6px;
            padding: 6px 10px;
            background: #f5f5f5;
            border-left: 2px solid #2196F3;
            font-size: 0.85em;
            color: #666;
            border-radius: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            background: #2196F3;
            color: white;
            border-radius: 50%;
            font-weight: 600;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        .step-item.error .step-number {
            background: #f44336;
        }

        .step-item.warning .step-number {
            background: #ff9800;
        }

        .step-item.success .step-number {
            background: #4caf50;
        }

        .step-item.error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }

        .step-item.warning {
            background: #fff3e0;
            border-left-color: #ff9800;
            color: #e65100;
        }

        .step-item.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
        }
    </style>
</head>

<body>
    <!-- Client ID Modal -->
    <div id="clientModal" class="modal-overlay">
        <div class="modal-content">
            <h2>👋 Chào mừng</h2>
            <p>Nhập Client ID để bắt đầu</p>
            <input type="text" id="clientInput" placeholder="Client ID..." autofocus />
            <div id="errorText" class="error-text"></div>
            <button class="modal-btn-primary" id="submitClientBtn">Tiếp tục</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-header">
            <span>Chat DB</span>
            <button class="header-close-btn" id="headerCloseBtn">✕</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="message-input" placeholder="Hỏi về database..." autofocus />
            <button id="send-btn">Gửi</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clientModal = document.getElementById('clientModal');
        const clientInput = document.getElementById('clientInput');
        const submitClientBtn = document.getElementById('submitClientBtn');
        const errorText = document.getElementById('errorText');
        const chatContainer = document.getElementById('chatContainer');
        const headerCloseBtn = document.getElementById('headerCloseBtn');

        let currentClientId = null;
        let currentEventSource = null;

        // Close button handler - notify parent to close widget
        headerCloseBtn.addEventListener('click', () => {
            if (window.parent !== window) {
                window.parent.postMessage({ action: 'closeWidget' }, '*');
            } else {
                // If not in iframe, just hide the container
                chatContainer.style.display = 'none';
                clientModal.style.display = 'flex';
            }
        });

        // Clear client on page load
        function generateClientId() {
            return "client_" + crypto.randomUUID();
        }

        // Get client ID from URL parameter
        function getClientIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('client_id');
        }

        // Register client with backend
        async function registerClient(clientId) {
            try {
                const res = await fetch('/client/v1/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_id: clientId })
                });
                const data = await res.json();
                console.log('Client registered:', clientId, data);
                return data.success || data.message?.includes('đã tồn tại');
            } catch (error) {
                console.error('Error registering client:', error);
                return false;
            }
        }

        async function loadClientId() {
            let clientId = getClientIdFromUrl() || localStorage.getItem('chatdb_client_id');

            // Auto-generate if not exists
            if (!clientId) {
                clientId = generateClientId();
                localStorage.setItem('chatdb_client_id', clientId);
            }

            // Register client with backend
            await registerClient(clientId);

            // Auto login - no modal
            currentClientId = clientId;
            clientModal.classList.remove('active');
            chatContainer.style.display = 'flex';
            messageInput.focus();
            initializeChat();
        }

        // Handle client ID submission
        async function handleClientSubmit() {
            const clientId = clientInput.value.trim();

            if (!clientId) {
                errorText.textContent = 'Vui lòng nhập Client ID';
                return;
            }

            submitClientBtn.disabled = true;
            errorText.textContent = '';

            try {
                // Check if client exists
                const checkRes = await fetch(`/client/v1/check?client_id=${encodeURIComponent(clientId)}`);
                const checkData = await checkRes.json();

                if (checkData.exists) {
                    errorText.textContent = 'Client ID đã tồn tại. Vui lòng dùng cái khác.';
                    submitClientBtn.disabled = false;
                    return;
                }

                // Register new client
                const success = await registerClient(clientId);

                if (!success) {
                    errorText.textContent = 'Lỗi đăng ký client';
                    submitClientBtn.disabled = false;
                    return;
                }

                // Save and login
                localStorage.setItem('chatdb_client_id', clientId);
                currentClientId = clientId;

                clientModal.classList.remove('active');
                chatContainer.style.display = 'flex';
                messageInput.focus();
                initializeChat();
            } catch (error) {
                errorText.textContent = 'Lỗi kết nối';
                submitClientBtn.disabled = false;
            }
        }

        clientInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleClientSubmit();
        });

        submitClientBtn.addEventListener('click', handleClientSubmit);

        // Initialize chat
        function initializeChat() {
            const empty = document.createElement('div');
            empty.classList.add('empty-state');
            empty.innerHTML = `
                <div class="empty-state-icon">💬</div>
                <h3>Chat DB</h3>
                <p>Hỏi về database của bạn</p>
            `;
            chatBox.appendChild(empty);
        }

        window.addEventListener('load', loadClientId);

        marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) { }
                }
                return hljs.highlightAuto(code).value;
            }
        });

        function parseStatusMessage(message) {
            // Parse messages like "INFO:message" or "ERROR:message"
            const match = message.match(/^(INFO|ERROR|WARNING|SUCCESS):(.*)/);
            if (match) {
                const prefix = match[1];
                const text = match[2].trim();
                const iconMap = {
                    'INFO': 'ℹ️',
                    'ERROR': '❌',
                    'WARNING': '⚠️',
                    'SUCCESS': '✅'
                };
                return {
                    icon: iconMap[prefix] || '❓',
                    text: text,
                    type: prefix.toLowerCase()
                };
            }
            return {
                icon: 'ℹ️',
                text: message,
                type: 'info'
            };
        }

        function getColorForType(type) {
            const colorMap = {
                'error': '#f44336',
                'warning': '#ff9800',
                'success': '#4caf50',
                'info': '#2196F3'
            };
            return colorMap[type] || '#2196F3';
        }

        function clearEmpty() {
            const empty = chatBox.querySelector('.empty-state');
            if (empty) empty.remove();
        }

        function addMessage(text, sender) {
            clearEmpty();
            const div = document.createElement('div');
            div.classList.add('message', sender);

            const span = document.createElement('span');
            span.textContent = text;
            div.appendChild(span);

            const time = document.createElement('div');
            time.classList.add('timestamp');
            time.textContent = new Date().toLocaleTimeString('vi-VN');
            div.appendChild(time);

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentClientId) return;

            addMessage(text, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;

            const botDiv = document.createElement('div');
            botDiv.classList.add('message', 'bot', 'streaming');
            clearEmpty();
            chatBox.appendChild(botDiv);

            // Status line
            const statusLine = document.createElement('div');
            statusLine.classList.add('status-line');
            statusLine.innerHTML = `<span class="status-text">Đang xử lý...</span>`;
            botDiv.appendChild(statusLine);

            // Steps container
            const stepsContainer = document.createElement('div');
            stepsContainer.classList.add('steps-container');
            botDiv.appendChild(stepsContainer);

            // Content
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('markdown-content');
            botDiv.appendChild(contentDiv);

            let accumulated = '';
            let steps = [];
            let toggleBtn = null;
            chatBox.scrollTop = chatBox.scrollHeight;

            // Send message with client_id
            currentEventSource = new EventSource(
                `/query/v1?message=${encodeURIComponent(text)}&client_id=${encodeURIComponent(currentClientId)}`
            );

            currentEventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'chunk') {
                        accumulated += data.response;
                        contentDiv.innerHTML = marked.parse(accumulated);
                        chatBox.scrollTop = chatBox.scrollHeight;
                    } else if (data.type === 'step') {
                        const parsed = parseStatusMessage(data.response);
                        const stepNumber = steps.length + 1;

                        // Update status line
                        statusLine.className = 'status-line ' + parsed.type;

                        // Add toggle button only once
                        if (steps.length === 0) {
                            toggleBtn = createToggleBtn(stepsContainer);
                            statusLine.appendChild(toggleBtn);
                        }

                        statusLine.querySelector('.status-text').innerHTML = `<span style="display: inline-flex; align-items: center; gap: 6px;"><strong style="background: ${getColorForType(parsed.type)}; color: white; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8em;">${stepNumber}</strong>${parsed.text}</span>`;

                        // Add to steps list
                        steps.push({ parsed, html: `${parsed.text}` });

                        // Update steps container
                        const stepItem = document.createElement('div');
                        stepItem.classList.add('step-item', parsed.type);
                        const cleanText = parsed.text.replace(/\.\.\.$/, '');
                        stepItem.innerHTML = `<span class="step-number">${stepNumber}</span><span>${cleanText}</span>`;
                        stepsContainer.appendChild(stepItem);

                        chatBox.scrollTop = chatBox.scrollHeight;
                    } else if (data.type === 'status') {
                        botDiv.classList.remove('streaming');

                        // Hide status line
                        statusLine.style.display = 'none';

                        // Create done summary
                        const doneSummary = document.createElement('div');
                        doneSummary.classList.add('done-summary');

                        const totalSteps = steps.length;
                        doneSummary.innerHTML = `<span class="done-text">Hoàn thành</span>`;

                        if (toggleBtn) {
                            doneSummary.appendChild(toggleBtn);
                        } else {
                            doneSummary.appendChild(createToggleBtn(stepsContainer));
                        }

                        botDiv.insertBefore(doneSummary, stepsContainer);

                        const time = document.createElement('div');
                        time.classList.add('timestamp');
                        time.textContent = new Date().toLocaleTimeString('vi-VN');
                        botDiv.appendChild(time);
                        sendBtn.disabled = false;
                        currentEventSource.close();
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };

            currentEventSource.onerror = () => {
                console.error('SSE Error');
                botDiv.classList.remove('streaming');
                contentDiv.innerHTML = '<p>Lỗi kết nối</p>';
                sendBtn.disabled = false;
                currentEventSource.close();
            };
        }

        function createToggleBtn(container) {
            const btn = document.createElement('button');
            btn.classList.add('toggle-steps-btn');
            btn.textContent = '▼';
            btn.title = 'Xem chi tiết các bước';
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                container.classList.toggle('expanded');
                btn.textContent = container.classList.contains('expanded') ? '▲' : '▼';
            });
            return btn;
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        window.addEventListener('beforeunload', () => {
            if (currentEventSource) currentEventSource.close();
        });
    </script>
</body>

</html>
