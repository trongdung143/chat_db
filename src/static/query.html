<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot CRM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue: #2563eb;
            --blue-mid: #3b82f6;
            --blue-bright: #60a5fa;
            --blue-pale: #dbeafe;
            --blue-glass: rgba(37, 99, 235, 0.10);
            --blue-glow: rgba(59, 130, 246, 0.32);

            --bg: #f0f5ff;
            --bg-card: #ffffff;
            --bg-input: #f4f8ff;

            --text-dark: #0f172a;
            --text-mid: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f8;
            --border-strong: #c7d7f5;

            --shadow-sm: 0 1px 4px rgba(37, 99, 235, 0.06), 0 2px 12px rgba(0, 0, 0, 0.04);
            --shadow-blue: 0 4px 20px rgba(37, 99, 235, 0.25);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
        }

        /* ─── CONTAINER ─── */
        #chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-card);
        }

        /* ─── HEADER ─── */
        .chat-header {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 55%, #3b82f6 100%);
            padding: 0 16px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .chat-header::before {
            content: '';
            position: absolute;
            top: -32px;
            right: -20px;
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 50%;
            pointer-events: none;
        }

        .chat-header::after {
            content: '';
            position: absolute;
            bottom: -44px;
            right: 68px;
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 11px;
            z-index: 1;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.16);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 1.5px solid rgba(255, 255, 255, 0.22);
        }

        .header-avatar img {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }

        .header-info {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-size: 14.5px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.01em;
        }

        .header-sub {
            font-size: 10.5px;
            color: rgba(255, 255, 255, 0.72);
            font-weight: 400;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .online-dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 7px rgba(74, 222, 128, 0.9);
            animation: pulse-dot 2.2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.55;
            }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.22);
            color: white;
        }

        .header-btn svg {
            width: 15px;
            height: 15px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .header-btn-new {
            font-size: 11px;
            font-weight: 600;
            font-family: 'Roboto', sans-serif;
            width: auto;
            padding: 0 10px;
            gap: 5px;
            white-space: nowrap;
        }

        .header-btn-new svg {
            width: 13px;
            height: 13px;
        }

        /* ─── LOADING BAR ─── */
        .loading-bar {
            height: 2px;
            background: rgba(37, 99, 235, 0.08);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .loading-bar-fill {
            position: absolute;
            top: 0;
            left: -60%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--blue-mid), var(--blue-bright), transparent);
            animation: loadSlide 1.3s ease-in-out infinite;
        }

        .loading-bar.idle .loading-bar-fill {
            display: none;
        }

        @keyframes loadSlide {
            from {
                left: -60%;
            }

            to {
                left: 110%;
            }
        }

        /* ─── STATUS BAR ─── */
        #statusBar {
            padding: 7px 14px;
            background: #f4f8ff;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            font-size: 12px;
            color: var(--text-mid);
        }

        #statusBar .step-row {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        #statusBar .step-num {
            width: 18px;
            height: 18px;
            background: var(--blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            flex-shrink: 0;
        }

        #statusBar .step-text {
            color: var(--text-mid);
        }

        #statusBar .step-dots {
            display: inline-flex;
            gap: 3px;
            align-items: center;
            margin-left: 2px;
        }

        #statusBar .step-dots span {
            width: 4px;
            height: 4px;
            background: var(--blue-mid);
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
            opacity: 0.7;
        }

        #statusBar .step-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        #statusBar .step-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* ─── CHAT BOX ─── */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 18px 14px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #chat-box::-webkit-scrollbar {
            width: 4px;
        }

        #chat-box::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 99px;
        }

        #chat-box::-webkit-scrollbar-thumb:hover {
            background: var(--blue-bright);
        }

        /* ─── MESSAGE ROWS ─── */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: msgIn 0.22s cubic-bezier(.22, .68, 0, 1.2) both;
        }

        .msg-row.user {
            justify-content: flex-end;
        }

        .msg-row.bot {
            justify-content: flex-start;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message {
            padding: 10px 14px;
            font-size: 13.5px;
            line-height: 1.65;
            word-wrap: break-word;
            word-break: break-word;
            min-width: 48px;
        }

        .message.user {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            border-radius: 18px 18px 4px 18px;
            box-shadow: var(--shadow-blue);
            max-width: 78%;
            white-space: pre-wrap;
        }

        .message.bot {
            background: var(--bg-card);
            color: var(--text-dark);
            border-radius: 4px 18px 18px 18px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            max-width: 92%;
        }

        .timestamp {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 4px;
        }

        .msg-row.user .timestamp {
            text-align: right;
        }

        .msg-row.bot .timestamp {
            text-align: left;
        }

        /* ─── TYPING ─── */
        .typing-indicator {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 6px 4px;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: var(--blue-bright);
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
            opacity: 0.55;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* ─── STATUS / STEPS ─── */
        .status-line {
            margin-bottom: 8px;
            padding: 7px 11px;
            background: #eff6ff;
            border-left: 3px solid var(--blue-mid);
            border-radius: 6px;
            font-size: 12px;
            color: #1d4ed8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-line.error {
            background: #fef2f2;
            border-left-color: #ef4444;
            color: #b91c1c;
        }

        .status-line.warning {
            background: #fffbeb;
            border-left-color: #f59e0b;
            color: #b45309;
        }

        .status-line.success {
            background: #f0fdf4;
            border-left-color: #22c55e;
            color: #15803d;
        }

        .status-text {
            flex: 1;
        }

        .done-summary {
            margin-bottom: 8px;
            padding: 4px 10px;
            background: var(--blue-glass);
            border-radius: 20px;
            font-size: 10.5px;
            color: var(--blue);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(37, 99, 235, 0.12);
        }

        .done-summary::before {
            content: '✓';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            background: var(--blue);
            color: white;
            border-radius: 50%;
            font-size: 8px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .done-text {
            flex: 1;
        }

        .toggle-steps-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 9px;
            padding: 2px 6px;
            color: var(--blue);
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .toggle-steps-btn:hover {
            opacity: 1;
        }

        .steps-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .steps-container.expanded {
            max-height: 500px;
            margin-bottom: 8px;
            opacity: 1;
        }

        .step-item {
            margin-bottom: 4px;
            padding: 5px 10px;
            background: #f4f8ff;
            border-radius: 7px;
            font-size: 11.5px;
            color: var(--text-mid);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 17px;
            height: 17px;
            background: var(--blue);
            color: white;
            border-radius: 50%;
            font-weight: 700;
            font-size: 9px;
            flex-shrink: 0;
        }

        .step-item.error {
            background: #fff5f5;
            border-color: rgba(239, 68, 68, 0.15);
            color: #b91c1c;
        }

        .step-item.warning {
            background: #fffbf0;
            border-color: rgba(245, 158, 11, 0.15);
            color: #b45309;
        }

        .step-item.success {
            background: #f0fdf4;
            border-color: rgba(34, 197, 94, 0.15);
            color: #15803d;
        }

        .step-item.error .step-number {
            background: #ef4444;
        }

        .step-item.warning .step-number {
            background: #f59e0b;
        }

        .step-item.success .step-number {
            background: #22c55e;
        }

        /* ─── MARKDOWN ─── */
        .markdown-content {
            line-height: 1.7;
            font-size: 13.5px;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin: 12px 0 6px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .markdown-content h1 {
            font-size: 1.45em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }

        .markdown-content h2 {
            font-size: 1.2em;
        }

        .markdown-content h3 {
            font-size: 1.05em;
        }

        .markdown-content p {
            margin: 6px 0;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 6px 0;
            padding-left: 20px;
        }

        .markdown-content li {
            margin: 3px 0;
        }

        .markdown-content code {
            background: #eff6ff;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: #1d4ed8;
            border: 1px solid #dbeafe;
        }

        .markdown-content pre {
            background: #0f172a;
            padding: 12px 14px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            color: #93c5fd;
            font-size: 0.87em;
            border: none;
        }

        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
            font-size: 13px;
        }

        .markdown-content table th,
        .markdown-content table td {
            border: 1px solid var(--border);
            padding: 7px 11px;
            text-align: left;
        }

        .markdown-content table th {
            background: var(--blue-pale);
            font-weight: 600;
            color: var(--blue);
        }

        .markdown-content table tr:nth-child(even) td {
            background: #f4f8ff;
        }

        .markdown-content blockquote {
            border-left: 3px solid var(--blue-mid);
            padding: 6px 12px;
            margin: 8px 0;
            background: var(--blue-glass);
            border-radius: 0 8px 8px 0;
            color: var(--text-mid);
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.14);
        }

        .empty-state-icon img {
            width: 38px;
            height: 38px;
            object-fit: contain;
            opacity: 0.78;
        }

        .empty-state h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-mid);
            margin-bottom: 5px;
        }

        .empty-state p {
            font-size: 12.5px;
            color: var(--text-muted);
            line-height: 1.65;
        }

        .hint-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
            margin-top: 16px;
        }

        .hint-chip {
            padding: 6px 13px;
            background: white;
            border: 1px solid var(--border-strong);
            border-radius: 20px;
            font-size: 11.5px;
            color: var(--blue);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s ease;
            font-family: 'Roboto', sans-serif;
        }

        .hint-chip:hover {
            background: var(--blue-pale);
            border-color: var(--blue-mid);
            box-shadow: 0 2px 10px rgba(37, 99, 235, 0.12);
        }

        /* ─── INLINE STATUS ROW ─── */
        .chat-status-row {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 13px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px 18px 18px 18px;
            box-shadow: var(--shadow-sm);
            font-size: 12.5px;
            color: var(--text-mid);
        }

        .chat-status-dots {
            display: inline-flex;
            gap: 3px;
            align-items: center;
        }

        .chat-status-dots span {
            width: 5px;
            height: 5px;
            background: var(--blue-mid);
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
            opacity: 0.7;
        }

        .chat-status-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .chat-status-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* ─── INPUT ─── */
        .input-area {
            padding: 12px 14px 8px;
            background: white;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 8px 8px 8px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--blue-mid);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
            background: white;
        }

        #message-input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'Roboto', sans-serif;
            font-size: 13.5px;
            color: var(--text-dark);
            outline: none;
            resize: none;
            overflow-y: hidden;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.55;
            padding: 0;
        }

        #message-input::placeholder {
            color: var(--text-muted);
        }

        #send-btn {
            width: 34px;
            height: 34px;
            border-radius: 11px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(37, 99, 235, 0.35);
            transition: all 0.18s ease;
            flex-shrink: 0;
        }

        #send-btn:hover:not(:disabled) {
            transform: scale(1.07);
            box-shadow: 0 5px 16px rgba(37, 99, 235, 0.5);
        }

        #send-btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        #send-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            box-shadow: none;
        }

        #send-btn svg {
            width: 14px;
            height: 14px;
            fill: white;
            margin-left: 1px;
        }

        /* ─── FOOTER ─── */
        .input-footer {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            padding: 5px 10px 6px;
            background: white;
            flex-shrink: 0;
            line-height: 1.6;
        }

        .input-footer a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 500;
        }

        .input-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="chat-container">

        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <div class="header-avatar">
                    <img src="https://cdn.officeai.vn/file/ai-agent-icon.png" alt="AI Agent" />
                </div>
                <div class="header-info">
                    <span class="header-title">Chatbot CRM</span>
                    <span class="header-sub">
                        <span class="online-dot"></span>AI agent · Trực tuyến
                    </span>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn header-btn-new" id="headerNewBtn" title="Cuộc trò chuyện mới">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    Chat mới
                </button>
                <button class="header-btn" id="headerCloseBtn" title="Thu nhỏ">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 12h14" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Loading bar -->
        <div class="loading-bar idle" id="loadingBar">
            <div class="loading-bar-fill"></div>
        </div>

        <!-- Status bar -->
        <div id="statusBar" style="display:none;"></div>

        <!-- Messages -->
        <div id="chat-box"></div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="message-input" placeholder="Nhập câu hỏi…" rows="1" autofocus></textarea>
                <button id="send-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="input-footer">
            Nội dung AI mang tính chất tham khảo<br>
            <a href="https://iteccom.vn" target="_blank">Phát triển bởi iteccom.vn</a>
        </div>

    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const headerCloseBtn = document.getElementById('headerCloseBtn');
        const loadingBar = document.getElementById('loadingBar');
        const statusBar = document.getElementById('statusBar');

        let currentClientId = null;
        let currentEventSource = null;
        let currentStatusRow = null;

        const headerNewBtn = document.getElementById('headerNewBtn');

        // Nút thu nhỏ — chỉ đóng widget, GIỮ NGUYÊN session/chat
        headerCloseBtn.addEventListener('click', () => {
            if (window.parent !== window) {
                window.parent.postMessage({ action: 'minimizeWidget' }, '*');
            } else {
                document.getElementById('chat-container').style.display = 'none';
            }
        });

        // Nút Chat mới — xóa session cũ + tạo client mới, GIỮ NGUYÊN box mở
        headerNewBtn.addEventListener('click', () => {
            if (window.parent !== window) {
                window.parent.postMessage({ action: 'newChat' }, '*');
            } else {
                if (currentEventSource) { currentEventSource.close(); currentEventSource = null; }
                chatBox.innerHTML = '';
                setLoading(false);
                initializeChat();
            }
        });

        function setLoading(active) {
            if (active) {
                loadingBar.classList.remove('idle');
            } else {
                loadingBar.classList.add('idle');
            }
        }

        function setStatusText(num, text) {
            // cập nhật text trong inline status row (nếu có)
            if (currentStatusRow) {
                const t = currentStatusRow.querySelector('.chat-status-text');
                if (t) t.textContent = text;
            }
        }

        function getClientIdFromUrl() {
            return new URLSearchParams(window.location.search).get('client_id');
        }

        async function registerClient(clientId) {
            try {
                const res = await fetch('/client/v1/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_id: clientId })
                });
                const data = await res.json();
                return data.success || data.message?.includes('đã tồn tại');
            } catch (error) {
                console.error('Error registering client:', error);
                return false;
            }
        }

        async function loadClientId() {
            setLoading(true);
            let clientId = getClientIdFromUrl() || localStorage.getItem('chatdb_client_id');
            if (!clientId) {
                clientId = "client_" + crypto.randomUUID();
                localStorage.setItem('chatdb_client_id', clientId);
            }
            await registerClient(clientId);
            currentClientId = clientId;
            setLoading(false);
            initializeChat();
            messageInput.focus();
        }

        function initializeChat() {
            const empty = document.createElement('div');
            empty.classList.add('empty-state');
            empty.innerHTML = `
            <div class="empty-state-icon">
            <img src="https://cdn.officeai.vn/file/ai-agent-icon.png" alt="Chatbot" />
            </div>
            <h3>Xin chào! 👋</h3>
            <p>Tôi là Chatbot hỗ trợ chăm sóc khách hàng.</p>
            <div class="hint-chips">
                <span class="hint-chip" onclick="fillHint(this)">Thông tin khách hàng có số điện thoại</span>
                <span class="hint-chip" onclick="fillHint(this)">Thông tin lịch sử giao dịch của khách hàng có số điện thoại</span>
            </div>
        `;
            chatBox.appendChild(empty);
        }

        function fillHint(el) {
            messageInput.value = el.textContent;
            messageInput.focus();
            messageInput.dispatchEvent(new Event('input'));
        }

        marked.setOptions({
            breaks: true, gfm: true,
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try { return hljs.highlight(code, { language: lang }).value; } catch (e) { }
                }
                return hljs.highlightAuto(code).value;
            }
        });

        function parseStatusMessage(message) {
            const match = message.match(/^(INFO|ERROR|WARNING|SUCCESS):(.*)/);
            if (match) {
                const prefix = match[1], text = match[2].trim();
                const iconMap = { INFO: 'ℹ️', ERROR: '❌', WARNING: '⚠️', SUCCESS: '✅' };
                return { icon: iconMap[prefix] || '❓', text, type: prefix.toLowerCase() };
            }
            return { icon: 'ℹ️', text: message, type: 'info' };
        }

        function clearEmpty() {
            const e = chatBox.querySelector('.empty-state');
            if (e) e.remove();
        }

        function addMessage(text, sender) {
            clearEmpty();
            const row = document.createElement('div');
            row.classList.add('msg-row', sender);

            const col = document.createElement('div');
            col.style.cssText = 'display:flex;flex-direction:column;max-width:82%;';
            if (sender === 'user') col.style.alignItems = 'flex-end';

            const bubble = document.createElement('div');
            bubble.classList.add('message', sender);
            bubble.textContent = text;

            const ts = document.createElement('div');
            ts.classList.add('timestamp');
            ts.textContent = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            col.appendChild(bubble);
            col.appendChild(ts);
            row.appendChild(col);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const text = messageInput.value.trim().replace(/\n+/g, ' ');
            if (!text || !currentClientId) return;

            addMessage(text, 'user');
            resetInputHeight();
            sendBtn.disabled = true;
            setLoading(true);
            clearEmpty();

            // Tạo inline status row ngay dưới tin nhắn user
            currentStatusRow = document.createElement('div');
            currentStatusRow.classList.add('msg-row', 'bot', 'status-inline-row');
            currentStatusRow.innerHTML = `<div class="chat-status-row"><span class="chat-status-dots"><span></span><span></span><span></span></span><span class="chat-status-text">Đang lấy dữ liệu ...</span></div>`;
            chatBox.appendChild(currentStatusRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            const row = document.createElement('div');
            row.classList.add('msg-row', 'bot');
            row.style.display = 'none';

            const col = document.createElement('div');
            col.style.cssText = 'display:flex;flex-direction:column;max-width:92%;';

            const botDiv = document.createElement('div');
            botDiv.classList.add('message', 'bot');
            botDiv.style.display = 'none';

            const statusLine = document.createElement('div');
            statusLine.classList.add('chat-status-row');
            statusLine.innerHTML = `<span class="chat-status-dots"><span></span><span></span><span></span></span><span class="chat-status-text">Đang lấy dữ liệu ...</span>`;

            const stepsContainer = document.createElement('div');
            stepsContainer.classList.add('steps-container');

            const contentDiv = document.createElement('div');
            contentDiv.classList.add('markdown-content');

            botDiv.appendChild(statusLine);
            botDiv.appendChild(stepsContainer);
            botDiv.appendChild(contentDiv);

            const ts = document.createElement('div');
            ts.classList.add('timestamp');

            col.appendChild(botDiv);
            col.appendChild(ts);
            row.appendChild(col);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;

            let accumulated = '';
            let steps = [];
            let toggleBtn = null;
            let firstChunk = true;

            const queryBase = window.location.origin;
            currentEventSource = new EventSource(
                `${queryBase}/query/v1?message=${encodeURIComponent(text)}&client_id=${encodeURIComponent(currentClientId)}`
            );

            currentEventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'chunk') {
                        if (firstChunk) {
                            statusLine.style.display = 'none';
                            if (currentStatusRow) { currentStatusRow.remove(); currentStatusRow = null; }
                            setLoading(false);
                            row.style.display = '';
                            botDiv.style.display = '';
                            firstChunk = false;
                        }
                        accumulated += data.response;
                        contentDiv.innerHTML = marked.parse(accumulated);
                        chatBox.scrollTop = chatBox.scrollHeight;

                    } else if (data.type === 'step') {
                        statusLine.style.display = 'none';
                        const parsed = parseStatusMessage(data.response);
                        const stepNumber = steps.length + 1;

                        setStatusText(stepNumber, parsed.text);

                        steps.push({ parsed, html: parsed.text });
                        const stepItem = document.createElement('div');
                        stepItem.classList.add('step-item', parsed.type);
                        stepItem.innerHTML = `<span>${parsed.text.replace(/\\.\.\.$/, '')}</span>`;
                        stepsContainer.appendChild(stepItem);
                        chatBox.scrollTop = chatBox.scrollHeight;

                    } else if (data.type === 'status') {
                        statusLine.style.display = 'none';
                        if (currentStatusRow) { currentStatusRow.remove(); currentStatusRow = null; }
                        setLoading(false);
                        row.style.display = '';
                        botDiv.style.display = '';

                        const doneSummary = document.createElement('div');
                        doneSummary.classList.add('done-summary');
                        doneSummary.innerHTML = `<span class="done-text">Hoàn thành</span>`;
                        if (steps.length > 0) {
                            if (!toggleBtn) toggleBtn = createToggleBtn(stepsContainer);
                            doneSummary.appendChild(toggleBtn);
                        }

                        botDiv.insertBefore(doneSummary, stepsContainer);
                        ts.textContent = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                        sendBtn.disabled = false;
                        currentEventSource.close();
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                } catch (e) { console.error('Parse error:', e); }
            };

            currentEventSource.onerror = () => {
                console.error('SSE Error');
                statusLine.style.display = 'none';
                contentDiv.innerHTML = '<p style="color:#ef4444">Lỗi kết nối. Vui lòng thử lại.</p>';
                sendBtn.disabled = false;
                setLoading(false);
                currentEventSource.close();
            };
        }

        function createToggleBtn(container) {
            const btn = document.createElement('button');
            btn.classList.add('toggle-steps-btn');
            btn.textContent = '▼';
            btn.title = 'Xem chi tiết các bước';
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                container.classList.toggle('expanded');
                btn.textContent = container.classList.contains('expanded') ? '▲' : '▼';
            });
            return btn;
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !sendBtn.disabled) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });

        function resetInputHeight() {
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }

        window.addEventListener('beforeunload', () => {
            if (currentEventSource) currentEventSource.close();
        });

        // Keepalive
        setInterval(() => {
            if (currentClientId) {
                fetch('/client/v1/keepalive', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_id: currentClientId })
                }).catch(() => { });
            }
        }, 120000);

        window.addEventListener('load', loadClientId);
    </script>
</body>

</html>
